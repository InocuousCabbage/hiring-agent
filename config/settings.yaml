# config/settings.yaml

# ─── Gmail Filter ───────────────────────────────────────────
gmail:
  alert_sender: "ali@hiring.cafe"        # direct alerts (kept for reference)
  alert_subject_contains: "HiringCafe"   # matches both direct and forwarded emails
  processed_label: "hiring-agent-processed"
  digest_subject_template: "Hiring.cafe Applications — {date}"

# ─── Job Processing ────────────────────────────────────────
jobs:
  max_per_run: 5
  sort_by: "newest"

# ─── JD Fetching ───────────────────────────────────────────
scraper:
  timeout_seconds: 15
  min_jd_length: 200          # chars — skip if JD is shorter
  require_section_headers: true  # must have Responsibilities/Requirements/etc
  use_playwright_fallback: true  # try headless browser if requests fails
  blocked_domains:             # domains that always require login
    - "lever.co/apply"
    - "myworkdayjobs.com"

# ─── Lane Classification ──────────────────────────────────
lanes:
  - name: "pmm"
    label: "Product Marketing (PMM)"
    template: "templates/resumes/base_resume.docx"
    signals:
      - "product marketing"
      - "positioning"
      - "go-to-market"
      - "GTM"
      - "competitive intelligence"
      - "product launch"
      - "sales enablement"
      - "analyst relations"

  - name: "content"
    label: "Content Marketing"
    template: "templates/resumes/base_resume.docx"
    signals:
      - "content marketing"
      - "content strategy"
      - "editorial"
      - "SEO"
      - "blog"
      - "thought leadership"
      - "brand voice"
      - "copywriting"

  - name: "mops"
    label: "Marketing Operations (MOps)"
    template: "templates/resumes/base_resume.docx"
    signals:
      - "marketing operations"
      - "marketing automation"
      - "Marketo"
      - "HubSpot"
      - "Salesforce"
      - "lead scoring"
      - "attribution"
      - "data pipeline"
      - "campaign operations"

# ─── Resume Tailoring ─────────────────────────────────────
resume:
  max_roles_to_edit: 3        # only touch first N roles
  max_skills_count: 12
  target_format: "docx"       # intermediate format before PDF
  min_confidence_score: 30    # skip jobs where tailor scores fit below this (0–100)

# ─── Cover Letter ─────────────────────────────────────────
# Cover letters are built programmatically in src/pdf_gen/renderer.py
# (`_create_cover_letter_docx`) — no DOCX template file is read or shipped.
cover_letter:
  max_paragraphs: 4
  max_projects_referenced: 2
  tone: "neutral"             # neutral | warm | assertive

# ─── QA ───────────────────────────────────────────────────
qa:
  max_retries: 2
  checks:
    - "no_fabricated_claims"
    - "one_page_max"
    - "skills_count_within_limit"
    - "edits_within_allowed_roles"
    - "no_robot_language"
    - "jd_keyword_coverage"

# ─── Hiring Manager Lookup ────────────────────────────────
contacts:
  enabled: true
  model: "claude-haiku-4-5-20251001"
  max_web_searches: 3
  timeout_seconds: 60
  generate_outreach_note: true
  outreach_note_max_words: 60

# ─── PDF Generation ───────────────────────────────────────
pdf:
  # Uses LibreOffice for DOCX→PDF conversion
  libreoffice_path: "libreoffice"  # or full path if needed
  filename_template: "{date}_{company}_{title}_{type}.pdf"

# ─── Auto-Apply (Phase 3) ─────────────────────────────────
# DEFAULT OFF for safety. Set apply.enabled: true only after
# `python -m src.apply.bootstrap greenhouse` completes.
# Schema is frozen — master-plan §4.7 (22 keys, incl. 4 under browserbase).
apply:
  enabled: false                       # master switch; default OFF (safety)
  mode: review                         # review | auto
  allowed_ats: [greenhouse]            # Phase 3 MVP; 3.5 adds lever, ashby; 3.6 adds workday, icims
  long_tail: none                      # none | computer_use  (variation-C graft opt-in)
  dry_run: true                        # if true, fill + screenshot + never click submit even on YES
  timeout_seconds: 90
  navigation_retries: 2
  rate_limit_per_ats_per_day: 10
  review_timeout_hours: 72
  review_reping_hours: 24
  retention_days: 30
  screenshot_dir: state/screenshots
  trace_dir: state/traces
  storage_state_dir: config/credentials/apply
  dedup_db_path: state/applied_jobs.db
  captcha_action: escalate             # escalate | skip
  captcha_transport: browserbase       # browserbase | local  (local = escalate immediately)
  profile_path: templates/candidate_profile.yaml
  gmail_label_prefix: "hiring-agent/apply"
  fast_path_recipient: env:MY_EMAIL
  browserbase:
    enabled: true
    solve_captchas: true              # Q_BB2
    proxies: true                     # Q_BB3
    block_ads: true

<html>
<head><title>Application - Acme Corp</title></head>
<body>
  <div class="application-confirmation-message" style="display:none;">Application received. Thank you.</div>
  <form id="application_form" action="/apply" method="post">
    <label for="first_name">First name</label>
    <input id="first_name" name="first_name" type="text"/>
    <label for="last_name">Last name</label>
    <input id="last_name" name="last_name" type="text"/>
    <label for="email">Email</label>
    <input id="email" name="email" type="email"/>
    <label for="resume">Resume</label>
    <input id="resume" name="resume" type="file"/>

    <fieldset>
      <legend>Are you legally authorized to work in the US?</legend>
      <select name="job_application[answers_attributes][0][boolean_value]">
        <option value="">Select...</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
      </select>
    </fieldset>

    <button type="submit">Submit Application</button>
  </form>
</body>
</html>

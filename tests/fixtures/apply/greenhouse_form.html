<!doctype html>
<html>
<head><title>Software Engineer at Acme</title></head>
<body>
  <div class="cookie-banner">
    <button type="button">Accept cookies</button>
  </div>

  <div id="wrapper">
    <h1>Apply for Software Engineer</h1>

    <form id="application_form" action="/acme/jobs/12345/applications" method="post" enctype="multipart/form-data">
      <div class="field">
        <label for="first_name">First Name *</label>
        <input type="text" id="first_name" name="job_application[first_name]" required>
      </div>

      <div class="field">
        <label for="last_name">Last Name *</label>
        <input type="text" id="last_name" name="job_application[last_name]" required>
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input type="email" id="email" name="job_application[email]" required>
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="job_application[phone]">
      </div>

      <div class="field">
        <label for="resume">Resume/CV *</label>
        <input type="file" id="resume" name="job_application[resume]" required accept=".pdf,.doc,.docx">
      </div>

      <div class="field">
        <label for="linkedin_url">LinkedIn Profile</label>
        <input type="url" id="linkedin_url" name="job_application[urls_attributes][0][value]">
      </div>

      <div class="field">
        <label for="job_application_answers_attributes_0_answer">Are you authorized to work in the US?</label>
        <select id="job_application_answers_attributes_0_answer" name="job_application[answers_attributes][0][answer]">
          <option value="">Please select</option>
          <option value="7734001">Yes</option>
          <option value="7734002">No</option>
        </select>
      </div>

      <div class="field">
        <label for="job_application_answers_attributes_1_answer">Do you require visa sponsorship?</label>
        <select id="job_application_answers_attributes_1_answer" name="job_application[answers_attributes][1][answer]">
          <option value="">Please select</option>
          <option value="8811001">Yes</option>
          <option value="8811002">No</option>
        </select>
      </div>

      <div class="button-container">
        <button type="submit">Submit Application</button>
      </div>
    </form>
  </div>
</body>
</html>

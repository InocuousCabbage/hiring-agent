projects:
  - id: "proj_001"
    name: "Marketing Automation Platform Migration"
    lane: ["mops", "pmm"]
    company: "Acme Corp"
    date_range: "2024–Present"
    summary: >
      Led end-to-end planning, migration, and launch of a new marketing
      automation platform integrated with the company's CRM, designing
      a custom sync model that preserved sales-cycle integrity and drove
      measurable pipeline creation.
    bullets:
      - "Led planning, testing, and launch of marketing automation platform within a complex pre-existing CRM ecosystem"
      - "Designed a custom integration strategy to bridge major differences between the two platforms' data models and business logic"
      - "Architected a hybrid data model to support multiple inquiry types rolling up into unified sales cycles"
      - "Built workflow logic to create new records per inquiry, manage active status, and preserve historical data"
      - "Implemented merge-path logic so reinquiries updated the correct open record instead of spawning duplicates"
      - "Configured ETL insert/update logic to branch between creating new records and updating existing open records"
      - "Mapped field-level data flow across Contacts, Leads, Opportunities, Deals, and Accounts"
      - "Migrated 100,000+ customer records with duplicate handling and record matching"
      - "Supported downstream BI reporting by structuring data for funnel, attribution, engagement, and system-health analysis"
    metrics:
      - "Generated $1M+ in pipeline through the new platform to date"
      - "Migrated 100,000+ customer records"
      - "Integrated marketing automation with CRM across inquiries, contacts, leads, opportunities, and deals"
      - "Reduced duplicate lead risk by enforcing a one-open-lead-per-person model"
    tools_used:
      - "Marketing Automation Platform"
      - "CRM"
      - "ETL / Integration Tool"
      - "BI Dashboard"
      - "Project Management Tool"
    tags:
      - "marketing automation"
      - "CRM integration"
      - "marketing operations"
      - "RevOps"
      - "data migration"
      - "workflow automation"
      - "sales lifecycle"
      - "data quality"
      - "pipeline generation"

  - id: "proj_002"
    name: "Marketing Attribution Infrastructure Implementation"
    lane: ["mops", "pmm"]
    company: "Acme Corp"
    date_range: "2024–2025"
    summary: >
      Led planning, scoping, testing, launch, and training for a marketing
      attribution infrastructure upgrade in the CRM, creating a framework
      to connect pipeline and revenue to marketing touchpoints across
      first-touch, campaign, category, and referral data.
    bullets:
      - "Led end-to-end implementation of CRM attribution updates connecting marketing activity to pipeline creation and revenue outcomes"
      - "Designed an attribution framework separating first-touch discovery, qualification-stage touchpoints, campaign attribution, category classification, referral tracking, and brand-awareness inputs"
      - "Implemented discovery channel and platform fields on lead records to capture how prospects reached the company"
      - "Mapped attribution fields from Lead to Opportunity upon qualification to preserve continuity deeper into the funnel"
      - "Corrected campaign governance by redefining source campaign as true campaign attribution"
      - "Added referrer company and referred lead fields across Lead, Opportunity, and Project records to improve referral attribution"
      - "Created a detailed QA and test plan covering digital inbound, referral traffic, direct traffic, paid social, and manual lead creation scenarios"
      - "Trained end users on updated form experience, required inputs, and expectations for manual vs automated attribution entry"
    metrics:
      - "Launched attribution updates across 2 business lines"
      - "Added 5 new lead-data fields and updated existing field logic in CRM"
      - "Extended attribution and referral continuity across Lead, Opportunity, and Project records"
      - "Enabled reporting by channel, platform, campaign, category, referral status, and funnel stage"
    tools_used:
      - "CRM"
      - "Marketing Automation Platform"
      - "BI Dashboard"
      - "Spreadsheet Tool"
      - "Project Management Tool"
    tags:
      - "marketing attribution"
      - "CRM"
      - "RevOps"
      - "marketing operations"
      - "pipeline reporting"
      - "data quality"

